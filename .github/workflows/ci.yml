name: churn-cml-dvc-ci

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CML CLI
        run: npm install -g @dvcorg/cml

      - name: Install dependencies
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: DVC pull
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          dvc pull || echo "No remote cache yet"

      - name: Train, track and push artifacts
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          if [ ! -f data/dataset.csv ] && [ -f seed_data/dataset.csv ]; then
            mkdir -p data
            cp seed_data/dataset.csv data/dataset.csv
            echo "Using fallback dataset from seed_data/ because DVC cache is not available"
          fi

          python script.py
          dvc add data models

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add data.dvc models.dvc || true
          [ -f dvc.lock ] && git add dvc.lock
          git commit -m "Update DVC metadata [skip ci]" || echo "Nothing to commit"

          dvc push || echo "Skipping dvc push (AWS remote unavailable in this run)"

      - name: Publish CML report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Metrics" > report.md
          cat metrics.txt >> report.md
          echo "" >> report.md
          echo "## Confusion Matrix" >> report.md
          echo "![confusion-matrix](./conf_matrix.png)" >> report.md

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            cml comment create --pr ${{ github.event.pull_request.number }} report.md
          else
            cml comment create report.md
          fi
